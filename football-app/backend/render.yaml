services:
  - type: web
    name: football-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://pes-points-table.vercel.app
