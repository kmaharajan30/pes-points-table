services:
  - type: web
    name: football-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DB_PATH
        value: /data/football.db
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://your-frontend.vercel.app
    disk:
      name: football-db
      mountPath: /data
      sizeGB: 1
